<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arc Project</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Georgia, serif;
      background-color: #ffffff;
      color: #000000;
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px;
      line-height: 1.7;
    }

    h1 {
      font-size: 2rem;
      font-weight: bold;
      border-bottom: 2px solid #000;
      padding-bottom: 12px;
      margin-bottom: 28px;
    }

    h2 {
      font-size: 1.4rem;
      font-weight: bold;
      margin-top: 40px;
      margin-bottom: 12px;
      border-left: 4px solid #000;
      padding-left: 10px;
    }

    h3 {
      font-size: 1.1rem;
      font-weight: bold;
      margin-top: 24px;
      margin-bottom: 8px;
    }

    p {
      margin-bottom: 12px;
    }

    ul, ol {
      margin-left: 24px;
      margin-bottom: 14px;
    }

    li {
      margin-bottom: 6px;
    }

    code {
      font-family: "Courier New", Courier, monospace;
      background-color: #f0f0f0;
      padding: 2px 6px;
      border: 1px solid #ccc;
      font-size: 0.9rem;
    }

    pre {
      background-color: #f0f0f0;
      border: 1px solid #aaa;
      padding: 16px;
      overflow-x: auto;
      margin: 14px 0;
      font-family: "Courier New", Courier, monospace;
      font-size: 0.88rem;
      line-height: 1.6;
      white-space: pre;
    }

    .section {
      margin-bottom: 36px;
    }

    .comparison-table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 0.95rem;
    }

    .comparison-table th,
    .comparison-table td {
      border: 1px solid #000;
      padding: 8px 12px;
      text-align: left;
    }

    .comparison-table th {
      background-color: #000;
      color: #fff;
    }

    .note {
      border: 1px solid #000;
      padding: 12px 16px;
      margin: 16px 0;
      background-color: #f9f9f9;
    }

    .troubleshoot-item {
      margin-bottom: 14px;
    }

    .troubleshoot-item .error {
      font-weight: bold;
    }

    hr {
      border: none;
      border-top: 1px solid #000;
      margin: 40px 0;
    }
  </style>
</head>
<body>

  <h1><a href="arc-day-01.html">Arc Day 1</a></h1>

  

</body>
</html>
